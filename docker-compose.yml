services:

  db:
    image: mysql:8.0
    container_name: gymtrack-db
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: gymtrack
    ports:
      - "3306:3306"
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d
      - db-data:/var/lib/mysql
    networks:
      - gymtrack-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: ./app
    container_name: gymtrack-app
    ports:
      - "5000:5000"
    environment:
      DB_HOST: gymtrack-db
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: gymtrack
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gymtrack-network
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  adminer:
    image: adminer
    container_name: gymtrack-adminer
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gymtrack-network

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    networks:
      - gymtrack-network
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./frontend:/usr/share/nginx/html

    
volumes:
  db-data:

networks:
  gymtrack-network:
    driver: bridge